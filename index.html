<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/proya-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0D7B89" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <title>珀莱雅 · 轻日程</title>
    <style>
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        background: #F6F9FB; display: flex;
        flex-direction: column; align-items: center; justify-content: center;
        transition: opacity .35s ease, visibility .35s ease;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
      }
      #splash.hide { opacity: 0; visibility: hidden; pointer-events: none; }
      .splash-logo {
        height: 32px; width: auto; margin-bottom: 12px;
        animation: splashPulse 2s ease-in-out infinite;
      }
      .splash-sub {
        font-size: 13px; color: #93A5AA; letter-spacing: .08em;
        font-family: "Noto Serif SC", "Songti SC", serif;
      }
      @keyframes splashPulse {
        0%, 100% { opacity: .8; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.04); }
      }
      @media (prefers-color-scheme: dark) {
        #splash { background: #0F1A1E; }
        .splash-sub { color: #5C747A; }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <img src="/proya-logo.png" alt="珀莱雅 · 轻日程" class="splash-logo" />
      <div class="splash-sub">珀莱雅 · 轻日程</div>
    </div>
    <div id="root"></div>
    <script>
      // Unregister old service worker that was causing white screen on revisit
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
