<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%233D3929'/><rect x='5' y='7' width='22' height='20' rx='3' fill='none' stroke='%23E8A840' stroke-width='1.5'/><line x1='5' y1='13' x2='27' y2='13' stroke='%23E8A840' stroke-width='1.5'/><line x1='10' y1='4' x2='10' y2='9' stroke='%23E8A840' stroke-width='1.5' stroke-linecap='round'/><line x1='22' y1='4' x2='22' y2='9' stroke='%23E8A840' stroke-width='1.5' stroke-linecap='round'/></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#3D3929" />
    <link rel="manifest" href="/manifest.json" />
    <title>DayPlan · 轻日程</title>
    <style>
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        background: #FBFAF7; display: flex;
        flex-direction: column; align-items: center; justify-content: center;
        transition: opacity .35s ease, visibility .35s ease;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
      }
      #splash.hide { opacity: 0; visibility: hidden; pointer-events: none; }
      .splash-icon {
        width: 48px; height: 48px; margin-bottom: 16px;
        animation: splashPulse 2s ease-in-out infinite;
      }
      .splash-title {
        font-size: 20px; font-weight: 700; color: #3D3929; letter-spacing: -.02em;
      }
      .splash-sub {
        font-size: 12px; color: #AAA59D; margin-top: 4px;
      }
      @keyframes splashPulse {
        0%, 100% { opacity: .6; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.05); }
      }
      @media (prefers-color-scheme: dark) {
        #splash { background: #1C1B18; }
        .splash-title { color: #D5CBB5; }
        .splash-sub { color: #6E6A64; }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <svg class="splash-icon" viewBox="0 0 48 48" fill="none">
        <rect x="4" y="6" width="40" height="36" rx="6" stroke="#E8A840" stroke-width="2.5"/>
        <line x1="4" y1="17" x2="44" y2="17" stroke="#E8A840" stroke-width="2"/>
        <line x1="15" y1="2" x2="15" y2="9" stroke="#E8A840" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="33" y1="2" x2="33" y2="9" stroke="#E8A840" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="14" cy="26" r="2.5" fill="#E8A840"/>
        <circle cx="21" cy="26" r="2.5" fill="#E8A840"/>
        <rect x="13" y="31" width="7" height="4" rx="2" fill="#E8A840"/>
      </svg>
      <div class="splash-title">DayPlan</div>
      <div class="splash-sub">轻日程 · 即开即用</div>
    </div>
    <div id="root"></div>
    <script>
      // Unregister old service worker that was causing white screen on revisit
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
